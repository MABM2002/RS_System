version: "3.9"

services:
  rs_system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rs_system_app
    ports:
      - "4000:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped