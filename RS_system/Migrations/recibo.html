<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e0e0e0;
    font-family: Arial, sans-serif;
  }

  @media print {
    body {
      background: white;
      margin: 0;
      padding: 0;
    }
    .no-print { display: none !important; }
    .page {
      margin: 0;
      padding: 0;
      box-shadow: none;
    }
    @page {
      size: 8.5in 11in;
      margin: 0.5in;
    }
  }

  .no-print {
    text-align: center;
    padding: 12px;
    background: #1976d2;
    color: white;
    font-size: 14px;
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 100;
    cursor: pointer;
  }
  .no-print button {
    background: white;
    color: #1976d2;
    border: none;
    padding: 6px 20px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    margin-left: 16px;
  }

  .page {
    width: 540pt;
    margin: 24px auto;
    background: white;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  .receipt {
    position: relative;
    width: 540pt;
    height: 342pt;
    overflow: hidden;
  }

  .receipt img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .field {
    position: absolute;
    background: transparent;
    border: none;
    outline: none;
    font-family: Arial, sans-serif;
    font-size: 12pt;
    color: #000;
    padding: 0;
    margin: 0;
    line-height: 1;
  }

  .field:focus {
    background: rgba(255,255,0,0.3);
  }

  .field-num {
    font-size: 13pt;
    font-weight: bold;
  }

  .field-letras {
    font-size: 9pt;
  }

  .field-x {
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: bold;
    font-size: 11pt;
  }

  @media print {
    .field:focus {
      background: transparent;
    }
  }
</style>
</head>
